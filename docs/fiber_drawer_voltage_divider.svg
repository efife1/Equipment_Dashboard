<svg viewBox="0 0 500 560" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <rect width="500" height="560" fill="#111111"/>

  <rect x="150" y="20" width="200" height="56" rx="8" fill="#1e1e1e" stroke="#555"/>
  <text x="250" y="42" fill="#eeeeee" font-size="13" font-weight="bold" text-anchor="middle">Fiber sensor output</text>
  <text x="250" y="62" fill="#999999" font-size="11" text-anchor="middle">0 to 20V</text>

  <line x1="250" y1="76" x2="250" y2="114" stroke="#888" stroke-width="1.5"/>
  <polygon points="250,120 245,110 255,110" fill="#888"/>

  <rect x="150" y="122" width="200" height="56" rx="8" fill="#1e1e1e" stroke="#555"/>
  <text x="250" y="144" fill="#eeeeee" font-size="13" font-weight="bold" text-anchor="middle">R1 - 56k ohm</text>
  <text x="250" y="164" fill="#999999" font-size="11" text-anchor="middle">1% tolerance</text>

  <line x1="250" y1="178" x2="250" y2="222" stroke="#888" stroke-width="1.5"/>
  <polygon points="250,228 245,218 255,218" fill="#888"/>
  <circle cx="250" cy="230" r="4" fill="#eeeeee"/>

  <line x1="250" y1="230" x2="370" y2="230" stroke="#888" stroke-width="1.5"/>
  <polygon points="378,230 368,225 368,235" fill="#888"/>
  <rect x="380" y="202" width="110" height="56" rx="8" fill="#1a2a3d" stroke="#42a5f5"/>
  <text x="435" y="224" fill="#eeeeee" font-size="12" font-weight="bold" text-anchor="middle">ESP32</text>
  <text x="435" y="242" fill="#90caf9" font-size="10.5" text-anchor="middle">0 to 3.03V</text>

  <line x1="250" y1="230" x2="250" y2="278" stroke="#888" stroke-width="1.5"/>
  <polygon points="250,284 245,274 255,274" fill="#888"/>

  <line x1="250" y1="230" x2="150" y2="230" stroke="#888" stroke-width="1.5"/>
  <polygon points="112,230 122,225 122,235" fill="#888"/>
  <rect x="10" y="202" width="112" height="56" rx="8" fill="#1e1e1e" stroke="#555"/>
  <text x="66" y="224" fill="#eeeeee" font-size="11.5" font-weight="bold" text-anchor="middle">3.3V Zener</text>
  <text x="66" y="242" fill="#999999" font-size="10" text-anchor="middle">clamp to GND</text>

  <rect x="150" y="286" width="200" height="56" rx="8" fill="#1e1e1e" stroke="#555"/>
  <text x="250" y="308" fill="#eeeeee" font-size="13" font-weight="bold" text-anchor="middle">R2 - 10k ohm</text>
  <text x="250" y="328" fill="#999999" font-size="11" text-anchor="middle">1% tolerance</text>

  <line x1="250" y1="342" x2="250" y2="396" stroke="#888" stroke-width="1.5"/>
  <polygon points="250,402 245,392 255,392" fill="#888"/>

  <rect x="150" y="404" width="200" height="44" rx="8" fill="#1e1e1e" stroke="#555"/>
  <text x="250" y="430" fill="#eeeeee" font-size="13" font-weight="bold" text-anchor="middle">Ground</text>

  <text x="250" y="480" fill="#777777" font-size="11" text-anchor="middle">0.1uF ceramic cap across R2 (not shown) filters ADC noise</text>
  <text x="250" y="500" fill="#777777" font-size="11" text-anchor="middle">Divider ratio: (R1+R2)/R2 = 6.6x recovery factor</text>
</svg>
